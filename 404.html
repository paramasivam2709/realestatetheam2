<!DOCTYPE html>
<html lang="en">
<head>
    <title>404 - Page Not Found | Stackly</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Same CSS as index -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/plugins.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <link href="css/coloring.css" rel="stylesheet">
    <link href="css/colors/scheme-01.css" rel="stylesheet">
</head>

<body class="dark-scheme">

    <!-- Header (same as index) -->
    <header class="header-light">
        <div class="container">
            <div class="de-flex">
                <div id="logo">
                    <a href="index.html">
                        <img class="logo-main" src="images/logo.webp" alt="">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>

        <section class="bg-dark-1 text-light d-flex align-items-center justify-content-center" style="height:100vh;">
            <div class="text-center">

                <!-- Big 404 -->
                <h1 style="font-size:140px; font-weight:700; line-height:1;">
                    404
                </h1>

                <h2 class="mb-3">Oops! Page Not Found</h2>

                <p class="mb-4" style="max-width:500px; margin:auto;">
                    The page you're looking for doesn't exist or has been moved.
                    Let's get you back to the beautiful property.
                </p>

                <!-- Buttons -->
                <div class="d-flex justify-content-center gap-3 flex-wrap">

                    <!-- Back Button -->
                    <button onclick="history.back()" class="btn-main fx-slide">
                        <span>Go Back</span>
                    </button>

                    <!-- Home Button -->
                    <a href="index.html" class="btn-main fx-slide">
                        <span>Back To Home</span>
                    </a>

                </div>

            </div>
        </section>

    </main>

    <!-- JS -->
    <script src="js/plugins.js"></script>
    <script src="js/designesia.js"></script>

</body>
</html>
